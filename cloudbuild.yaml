steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/r-script-job:$BUILD_ID', '.']

  # 2. Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/r-script-job:$BUILD_ID']

  # 3. Run the container and inject the environment variables
  - name: 'gcr.io/$PROJECT_ID/r-script-job:$BUILD_ID'
    env:
      - '_AUTH_KEY=${_AUTH_KEY}'
      - '_JSON_SECRET=${_JSON_SECRET}'

images:
  - 'gcr.io/$PROJECT_ID/r-script-job:$BUILD_ID'

options:
  logging: CLOUD_LOGGING_ONLY
